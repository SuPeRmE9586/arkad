<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

const SUPABASE_URL="https://kvapzwtculjqnvycvrvi.supabase.co";
const SUPABASE_KEY="sb_publishable_k6hmu88rVk23x_RyfBhLkQ_OB33Mr8p";

async function dbLoad(){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/arkad?id=eq.main&select=data`,{
      headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`}
    });
    const json=await r.json();
    if(json&&json[0]&&json[0].data&&Object.keys(json[0].data).length>0)return json[0].data;
    return null;
  }catch(e){return null;}
}

async function dbSave(data){
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/arkad?id=eq.main`,{
      method:"PATCH",
      headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json","Prefer":"return=minimal"},
      body:JSON.stringify({data,updated_at:new Date().toISOString()})
    });
    return true;
  }catch(e){return false;}
}

const JARS=[
  {id:"car",name:"Машина",emoji:"🚗",color:"#9B59B6"},
  {id:"base",name:"Базові",emoji:"🏠",color:"#E67E22"},
  {id:"personal",name:"Мої",emoji:"🎮",color:"#3498DB"},
  {id:"couple",name:"Удвох",emoji:"💑",color:"#E74C3C"},
];

const GOALS_INIT=[
  {id:"dima",name:"Діма",emoji:"🔑",target:400,done:false,color:"#E67E22"},
  {id:"apt",name:"Квартира",emoji:"🏠",target:3000,done:false,color:"#27AE60"},
  {id:"ins",name:"Страхування",emoji:"🛡️",target:2700,done:false,color:"#3498DB"},
];

const QUESTS=[
  {id:1,title:"Закрити квартиру",desc:"Накопич і заплати 3000 zł за квартиру до червня",xp:300,goalId:"apt"},
  {id:2,title:"Закрити страхування",desc:"Накопич і заплати 2700 zł за страхування до червня",xp:250,goalId:"ins"},
  {id:3,title:"Розрахуватись з Дімою",desc:"Накопич і віддай 400 zł Дімі до червня",xp:150,goalId:"dima"},
  {id:4,title:"Закрити всі цілі",desc:"Виконати всі три фінансові цілі до червня 2026",xp:500,goalId:null},
];

const LEVELS=[
  {lv:1,title:"Початківець",xp:0,ic:"🌱"},{lv:2,title:"Ощадливий",xp:200,ic:"💰"},
  {lv:3,title:"Дисциплінований",xp:500,ic:"⚔️"},{lv:4,title:"Стратег",xp:900,ic:"🏛️"},
  {lv:5,title:"Майстер фінансів",xp:1500,ic:"👑"},
];

const TIPS=["«Частину всіх грошей, що заробляєш — залиш собі» — Аркад","Контролюй витрати щодня","Кожна злотна в банку — крок до свободи","Дисципліна сьогодні — свобода завтра","Готівка яку не записав — готівка яку втратив","Маленькі кроки щодня = великий результат"];
const MN=["Січень","Лютий","Березень","Квітень","Травень","Червень","Липень","Серпень","Вересень","Жовтень","Листопад","Грудень"];
const DN=["Пн","Вт","Ср","Чт","Пт","Сб","Нд"];
const DEADLINE=new Date(2026,5,1);

function mon(d){const x=new Date(d);const dy=x.getDay();x.setDate(x.getDate()-dy+(dy===0?-6:1));x.setHours(0,0,0,0);return x;}
function sun(d){const m=mon(d);m.setDate(m.getDate()+6);m.setHours(23,59,59,999);return m;}
function fmt(d){return d.getDate().toString().padStart(2,"0")+"."+(d.getMonth()+1).toString().padStart(2,"0");}
function r2(n){return Math.round(n*100)/100;}
function parseNum(s){if(!s)return 0;return parseFloat(s.replace(",","."))||0;}
function fmtN(n){return Number.isInteger(n)?n.toString():n.toFixed(2);}
function daysLeft(){return Math.max(0,Math.ceil((DEADLINE-new Date())/(1000*60*60*24)));}

const EMPTY={incomes:[],allocs:[],goalAllocs:[],goals:GOALS_INIT,xp:0,doneQ:[],transfers:[]};

function App(){
  const[data,setData]=useState(null);
  const[loading,setLoading]=useState(true);
  const[syncStatus,setSyncStatus]=useState("ok");
  const[tab,setTab]=useState("main");
  const[incModal,setIncModal]=useState(false);
  const[incAmt,setIncAmt]=useState("");
  const[incType,setIncType]=useState("cash");
  const[jarModal,setJarModal]=useState(null);
  const[jarAmt,setJarAmt]=useState("");
  const[jarCom,setJarCom]=useState("");
  const[jarPay,setJarPay]=useState("cash");
  const[goalModal,setGoalModal]=useState(null);
  const[goalAmt,setGoalAmt]=useState("");
  const[goalPay,setGoalPay]=useState("cash");
  const[xferModal,setXferModal]=useState(false);
  const[xferAmt,setXferAmt]=useState("");
  const[xferDir,setXferDir]=useState("cash2card");
  const[selDay,setSelDay]=useState(null);
  const[jarHist,setJarHist]=useState(null);
  const[lvlUp,setLvlUp]=useState(false);
  const[toast,setToast]=useState("");
  const[openCat,setOpenCat]=useState(null);
  const[statMonth,setStatMonth]=useState(new Date().getMonth());
  const[questOpen,setQuestOpen]=useState(null);
  const saveTimer=useRef(null);
  const isFirst=useRef(true);

  useEffect(()=>{
    dbLoad().then(d=>{
      if(d){
        if(!d.goalAllocs)d.goalAllocs=[];
        if(!d.goals)d.goals=GOALS_INIT.map(g=>({...g}));
        if(!d.transfers)d.transfers=[];
        setData(d);
      }
      setLoading(false);
    });
  },[]);

  useEffect(()=>{
    if(!data)return;
    if(isFirst.current){isFirst.current=false;return;}
    setSyncStatus("saving");
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      const ok=await dbSave(data);
      setSyncStatus(ok?"ok":"err");
    },1000);
  },[data]);

  const now=new Date();
  const wS=mon(now);
  const wE=sun(now);

  function totalIncome(){return r2((data?data.incomes:[]).reduce((s,i)=>s+i.amount,0));}
  function totalAllocAll(){return r2(((data?data.allocs:[]).reduce((s,a)=>s+a.amount,0))+((data?data.goalAllocs||[]:[]).reduce((s,a)=>s+a.amount,0)));}
  function totalAllocFrom(src){
    const reg=r2((data?data.allocs:[]).filter(a=>a.payFrom===src).reduce((s,a)=>s+a.amount,0));
    const goal=r2((data?data.goalAllocs||[]:[]).filter(a=>a.payFrom===src).reduce((s,a)=>s+a.amount,0));
    return r2(reg+goal);
  }
  function wAll(jid){return r2((data?data.allocs:[]).filter(a=>{const d=new Date(a.date);return a.jarId===jid&&d>=wS&&d<=wE;}).reduce((s,a)=>s+a.amount,0));}
  const allXfers=data?data.transfers||[]:[];
  const allC2C=r2(allXfers.filter(t=>t.dir==="cash2card").reduce((s,t)=>s+t.amount,0));
  const allCC2=r2(allXfers.filter(t=>t.dir==="card2cash").reduce((s,t)=>s+t.amount,0));
  const totalCashInc=r2((data?data.incomes:[]).filter(i=>i.type==="cash").reduce((s,i)=>s+i.amount,0));
  const totalCardInc=r2((data?data.incomes:[]).filter(i=>i.type==="card").reduce((s,i)=>s+i.amount,0));
  const cashBal=r2(totalCashInc-totalAllocFrom("cash")-allC2C+allCC2);
  const cardBal=r2(totalCardInc-totalAllocFrom("card")+allC2C-allCC2);
  const remaining=r2(cashBal+cardBal);
  function mInc(m){return r2((data?data.incomes:[]).filter(i=>{const d=new Date(i.date);return d.getMonth()===m&&d.getFullYear()===now.getFullYear();}).reduce((s,i)=>s+i.amount,0));}
  function mAllocs(m){return r2((data?data.allocs:[]).filter(a=>{const d=new Date(a.date);return d.getMonth()===m&&d.getFullYear()===now.getFullYear();}).reduce((s,a)=>s+a.amount,0));}
  function mAllocsJar(jid,m){return r2((data?data.allocs:[]).filter(a=>{const d=new Date(a.date);return a.jarId===jid&&d.getMonth()===m&&d.getFullYear()===now.getFullYear();}).reduce((s,a)=>s+a.amount,0));}
  function mAllocsDetail(jid,m){return(data?data.allocs:[]).filter(a=>{const d=new Date(a.date);return a.jarId===jid&&d.getMonth()===m&&d.getFullYear()===now.getFullYear();}).sort((a,b)=>new Date(b.date)-new Date(a.date));}
  function goalSaved(gid){return r2((data?data.goalAllocs||[]:[]).filter(a=>a.goalId===gid).reduce((s,a)=>s+a.amount,0));}

  const curLvl=LEVELS.reduce((a,l)=>((data?data.xp:0)>=l.xp?l:a),LEVELS[0]);
  const nxtLvl=LEVELS.find(l=>l.xp>(data?data.xp:0))||LEVELS[LEVELS.length-1];
  const xpPct=nxtLvl.xp>curLvl.xp?(((data?data.xp:0)-curLvl.xp)/(nxtLvl.xp-curLvl.xp))*100:100;
  const streak=(()=>{if(!data)return 0;let s=0;const d=new Date(now);while(true){const ds=d.toISOString().split("T")[0];if(data.allocs.some(a=>a.date.split("T")[0]===ds)||data.incomes.some(i=>i.date.split("T")[0]===ds)){s++;d.setDate(d.getDate()-1);}else break;}return s;})();

  function doXP(n){if(!data)return n;const old=LEVELS.reduce((a,l)=>(data.xp>=l.xp?l:a),LEVELS[0]);const nx=data.xp+n;const nw=LEVELS.reduce((a,l)=>(nx>=l.xp?l:a),LEVELS[0]);if(nw.lv>old.lv){setLvlUp(true);setTimeout(()=>setLvlUp(false),2500);}return nx;}
  function showT(m){setToast(m);setTimeout(()=>setToast(""),1800);}

  function addIncome(){const a=parseNum(incAmt);if(!a||a<=0)return;const nx=doXP(15);setData(p=>({...p,incomes:[...p.incomes,{id:Date.now(),amount:r2(a),type:incType,date:new Date().toISOString()}],xp:nx}));setIncAmt("");setIncModal(false);showT("💵 +"+fmtN(r2(a))+" zł");}
  function allocate(){const a=parseNum(jarAmt);if(!a||a<=0||!jarModal)return;const srcBal=jarPay==="cash"?cashBal:cardBal;if(a>srcBal){showT("❌ Не вистачає!");return;}const nx=doXP(10);setData(p=>({...p,allocs:[...p.allocs,{id:Date.now(),jarId:jarModal,amount:r2(a),comment:jarCom,payFrom:jarPay,date:new Date().toISOString()}],xp:nx}));setJarAmt("");setJarCom("");setJarModal(null);showT("✓ В банку!");}
  function allocateGoal(){const a=parseNum(goalAmt);if(!a||a<=0||!goalModal)return;const srcBal=goalPay==="cash"?cashBal:cardBal;if(a>srcBal){showT("❌ Не вистачає!");return;}const nx=doXP(15);setData(p=>({...p,goalAllocs:[...(p.goalAllocs||[]),{id:Date.now(),goalId:goalModal,amount:r2(a),payFrom:goalPay,date:new Date().toISOString()}],xp:nx}));setGoalAmt("");setGoalModal(null);showT("🎯 В ціль!");}
  function markGoalDone(gid){setData(p=>({...p,goals:p.goals.map(g=>g.id===gid?{...g,done:true}:g)}));showT("✅ Ціль виконана!");}
  function doTransfer(){const a=parseNum(xferAmt);if(!a||a<=0)return;setData(p=>({...p,transfers:[...(p.transfers||[]),{id:Date.now(),amount:r2(a),dir:xferDir,date:new Date().toISOString()}]}));setXferAmt("");setXferModal(false);showT("↔ Переказ "+fmtN(r2(a))+" zł");}
  function delAlloc(id){setData(p=>({...p,allocs:p.allocs.filter(a=>a.id!==id)}));}
  function delGoalAlloc(id){setData(p=>({...p,goalAllocs:(p.goalAllocs||[]).filter(a=>a.id!==id)}));}
  function delInc(id){setData(p=>({...p,incomes:p.incomes.filter(i=>i.id!==id)}));}
  function doQuest(qid){if(data.doneQ.includes(qid))return;const q=QUESTS.find(x=>x.id===qid);const nx=doXP(q.xp);setData(p=>({...p,doneQ:[...p.doneQ,qid],xp:nx}));}
  function resetAll(){if(confirm("Видалити ВСІ дані?")){setData({...EMPTY,goals:GOALS_INIT.map(g=>({...g}))});}}

  const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const fd=new Date(now.getFullYear(),now.getMonth(),1).getDay();
  const af=fd===0?6:fd-1;
  const dayA=(day)=>(data?data.allocs:[]).filter(a=>{const d=new Date(a.date);return d.getDate()===day&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const dayT=(day)=>r2(dayA(day).reduce((s,a)=>s+a.amount,0));
  const jHist=(jid)=>(data?data.allocs:[]).filter(a=>a.jarId===jid).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,30);
  const tip=TIPS[now.getDate()%TIPS.length];
  const availMonths=[];
  if(data){const allDates=[...data.incomes,...data.allocs].map(x=>new Date(x.date).getMonth());for(let m=0;m<12;m++){if(allDates.includes(m)||m===now.getMonth())availMonths.push(m);}}

  if(loading)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:"#F1C40F"}}><div style={{fontSize:48}}>🏛️</div><div style={{fontSize:16}}>Завантаження з хмари...</div></div>);

  if(!data)return(
    <div className="ob">
      <div style={{fontSize:56,marginBottom:12}}>🏛️</div>
      <h1 className="ob-t">Шлях Аркада</h1>
      <p className="ob-s">Розподіляй зарплату по банках<br/>та закрий всі цілі до червня 2026</p>
      <div className="ob-c"><p className="ob-q">«Частину всіх грошей, що заробляєш — залиш собі»</p><p className="ob-a">— Аркад</p></div>
      <div className="ob-b">
        <div style={{color:"#F1C40F",fontSize:11,letterSpacing:2,marginBottom:8}}>ЦІЛІ ДО ЧЕРВНЯ</div>
        {GOALS_INIT.map(g=><div key={g.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:13}}><span>{g.emoji} {g.name}</span><span style={{color:g.color,fontWeight:700}}>{g.target} zł</span></div>)}
        <div style={{marginTop:10,paddingTop:8,borderTop:"1px solid #2d2518",display:"flex",justifyContent:"space-between",fontSize:12,color:"#8a7d65"}}><span>Загалом:</span><span style={{color:"#E67E22",fontWeight:700}}>6 100 zł</span></div>
      </div>
      <button className="start" onClick={()=>setData({...EMPTY,goals:GOALS_INIT.map(g=>({...g}))})}>⚔️ Почати подорож</button>
    </div>
  );

  const goals=data.goals||GOALS_INIT;
  const activeGoals=goals.filter(g=>!g.done);
  const doneGoals=goals.filter(g=>g.done);
  const totalGoalTarget=goals.reduce((s,g)=>s+g.target,0);
  const totalGoalSaved=r2(goals.reduce((s,g)=>s+goalSaved(g.id),0));

  return(
    <div className="app">
      {lvlUp&&<div className="lvl-o"><div className="lvl-i">{curLvl.ic}</div><div className="lvl-t">Новий рівень!</div><div className="lvl-n">{curLvl.title}</div></div>}
      {toast&&<div className="toast">{toast}</div>}
      <div className="hdr">
        <div className="hdr-r"><div><div className="hdr-t">🏛️ Шлях Аркада</div><div className="hdr-s">{curLvl.ic} {curLvl.title}</div></div><div className="hdr-b"><span className="bdg bdg-f">🔥{streak}</span><span className="bdg bdg-g">{data.xp}xp</span></div></div>
        <div className="xp-bar"><div className="xp-fill" style={{width:xpPct+"%"}}/></div>
      </div>

      <div className="ct">
        {tab==="main"&&<>
          <div className={`sync-bar${syncStatus==="err"?" err":syncStatus==="saving"?" saving":""}`}>
            {syncStatus==="ok"?"☁️ Дані збережені в хмарі":syncStatus==="saving"?"⏳ Збереження...":"❌ Помилка збереження — перевір інтернет"}
          </div>
          <div className="tip">📜 {tip}</div>
          <div className="deadline-bar"><span className="deadline-l">⏳ До червня 2026</span><span className="deadline-r">{daysLeft()} днів</span></div>
          <div className="sal">
            <div className="sal-h"><span className="sal-l">Загальний баланс</span><span className="sal-d">Тиждень: {fmt(wS)}–{fmt(wE)}</span></div>
            <div className="sal-big" style={{color:remaining<0?"#FF6B6B":remaining===0?"#27AE60":"#F1C40F"}}>{fmtN(remaining)} zł</div>
            <div className="sal-small">Отримано: {fmtN(totalIncome())} zł · Витрачено: {fmtN(totalAllocAll())} zł</div>
            <div className="sal-bk">
              <div className="sal-tp"><span>💵</span><span className="sal-tl">Готівка</span><span className="sal-ta" style={{color:cashBal<0?"#FF6B6B":"#d4c9b0"}}>{fmtN(cashBal)} zł</span></div>
              <div className="sal-tp"><span>💳</span><span className="sal-tl">Карта</span><span className="sal-ta" style={{color:cardBal<0?"#FF6B6B":"#d4c9b0"}}>{fmtN(cardBal)} zł</span></div>
            </div>
            <div className="btn-row">
              <button className="btn-add" onClick={()=>setIncModal(true)}>+ Дохід</button>
              <button className="btn-xfer" onClick={()=>setXferModal(true)}>↔ Переказ</button>
            </div>
          </div>
          <div className="j-title">Банки</div>
          <div className="j-grid">{JARS.map(j=>{const sp=wAll(j.id);return(<button key={j.id} className="j-card" onClick={()=>{setJarModal(j.id);setJarAmt("");setJarCom("");setJarPay("cash");}}><div className="j-em">{j.emoji}</div><div className="j-nm">{j.name}</div><div className="j-am" style={{color:j.color}}>{fmtN(sp)} zł</div><span className="j-hb" onClick={e=>{e.stopPropagation();setJarHist(jarHist===j.id?null:j.id);}}>📋</span></button>);})}</div>
          {jarHist&&<div className="hist"><div className="hist-t"><span>{JARS.find(j=>j.id===jarHist)?.emoji} {JARS.find(j=>j.id===jarHist)?.name}</span><button className="cls" onClick={()=>setJarHist(null)}>✕</button></div>{jHist(jarHist).length===0?<div className="emp">Поки пусто</div>:jHist(jarHist).map(a=>(<div key={a.id} className="hist-r"><div><div className="hist-a">{a.payFrom==="cash"?"💵":"💳"} {fmtN(a.amount)} zł</div>{a.comment&&<div className="hist-c">{a.comment}</div>}<div className="hist-d">{new Date(a.date).toLocaleDateString("uk-UA",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</div></div><button className="del" onClick={()=>delAlloc(a.id)}>🗑️</button></div>))}</div>}
          <div className="goal-title">🎯 Цілі до червня ({fmtN(totalGoalSaved)} / {totalGoalTarget} zł)</div>
          <div style={{background:"#1a1612",borderRadius:10,padding:"10px 14px",marginBottom:14,border:"1px solid #2d1f0a"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12}}><span style={{color:"#8a7d65"}}>Загальний прогрес</span><span style={{color:"#E67E22",fontWeight:700}}>{Math.round((totalGoalSaved/totalGoalTarget)*100)}%</span></div>
            <div className="goal-bar" style={{marginBottom:0}}><div className="goal-fill" style={{width:Math.min((totalGoalSaved/totalGoalTarget)*100,100)+"%",backgroundColor:"#E67E22"}}/></div>
          </div>
          {activeGoals.map(g=>{const saved=goalSaved(g.id);const pct=Math.min((saved/g.target)*100,100);const gAllocs=(data.goalAllocs||[]).filter(a=>a.goalId===g.id).sort((a,b)=>new Date(b.date)-new Date(a.date));return(<div key={g.id} className="goal-card"><div className="goal-header"><span className="goal-name">{g.emoji} {g.name}</span><span className="goal-badge">{Math.round(pct)}%</span></div><div className="goal-amounts"><span className="goal-saved">{fmtN(saved)} zł</span><span className="goal-target">з {g.target} zł</span></div><div className="goal-bar"><div className="goal-fill" style={{width:pct+"%",backgroundColor:g.color}}/></div><div className="goal-actions"><button className="goal-btn" onClick={()=>{setGoalModal(g.id);setGoalAmt("");setGoalPay("cash");}}>+ Поповнити</button>{saved>=g.target&&<button className="goal-done-btn" onClick={()=>markGoalDone(g.id)}>✓ Виконано</button>}</div>{gAllocs.length>0&&<div style={{marginTop:8,borderTop:"1px solid #222",paddingTop:8}}>{gAllocs.slice(0,3).map(a=>(<div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",fontSize:12}}><span style={{color:"#8a7d65"}}>{a.payFrom==="cash"?"💵":"💳"} {fmtN(a.amount)} zł — {new Date(a.date).toLocaleDateString("uk-UA",{day:"numeric",month:"short"})}</span><button className="del" style={{fontSize:11}} onClick={()=>delGoalAlloc(a.id)}>🗑️</button></div>))}</div>}</div>);})}
          {doneGoals.map(g=>(<div key={g.id} className="goal-card done"><div className="goal-header"><span className="goal-name">{g.emoji} {g.name}</span><span className="goal-badge done">✓ Виконано</span></div></div>))}
          {data.incomes.filter(i=>{const d=new Date(i.date);return d>=wS&&d<=wE;}).length>0&&<div className="hist"><div className="hist-t">💰 Доходи тижня</div>{[...data.incomes].filter(i=>{const d=new Date(i.date);return d>=wS&&d<=wE;}).reverse().map(i=>(<div key={i.id} className="hist-r"><div><div className="hist-a">{i.type==="cash"?"💵":"💳"} +{fmtN(i.amount)} zł</div><div className="hist-d">{new Date(i.date).toLocaleDateString("uk-UA",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</div></div><button className="del" onClick={()=>delInc(i.id)}>🗑️</button></div>))}</div>}
        </>}

        {tab==="stats"&&<>
          <div className="month-tabs">{(availMonths.length>0?availMonths:[now.getMonth()]).map(m=>(<button key={m} className={"month-tab"+(statMonth===m?" on":"")} onClick={()=>setStatMonth(m)}>{MN[m]}</button>))}</div>
          <div className="sc"><div className="sc-t">{MN[statMonth]} {now.getFullYear()}</div><div className="sc-g"><div style={{textAlign:"center"}}><div className="sc-v">{fmtN(mInc(statMonth))} zł</div><div className="sc-l">Дохід</div></div><div style={{textAlign:"center"}}><div className="sc-v" style={{color:"#FF6B6B"}}>{fmtN(mAllocs(statMonth))} zł</div><div className="sc-l">Витрати</div></div><div style={{textAlign:"center"}}><div className="sc-v" style={{color:"#27AE60"}}>{fmtN(r2(mInc(statMonth)-mAllocs(statMonth)))} zł</div><div className="sc-l">Залишок</div></div></div></div>
          <div className="sec">По банках</div>
          {JARS.map(j=>{const m=mAllocsJar(j.id,statMonth);const details=mAllocsDetail(j.id,statMonth);const isOpen=openCat===j.id;return(<div key={j.id}><div className="cat-row" onClick={()=>setOpenCat(isOpen?null:j.id)}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:14}}>{j.emoji} {j.name} <span style={{fontSize:11,color:"#5a4d35"}}>{isOpen?"▲":"▼"}</span></span><span style={{color:j.color,fontSize:14,fontWeight:700}}>{fmtN(m)} zł</span></div><div className="mb"><div className="mbf" style={{width:Math.min(m/100*10,100)+"%",backgroundColor:j.color}}/></div></div>{isOpen&&<div className="cat-detail">{details.length===0?<div className="emp">Немає записів</div>:details.map(a=>(<div key={a.id} className="cat-detail-r"><div><div style={{fontSize:13,fontWeight:600}}>{a.payFrom==="cash"?"💵":"💳"} {fmtN(a.amount)} zł</div>{a.comment&&<div style={{fontSize:11,color:"#8a7d65",marginTop:2}}>{a.comment}</div>}<div style={{fontSize:10,color:"#5a4d35",marginTop:2}}>{new Date(a.date).toLocaleDateString("uk-UA",{day:"numeric",month:"long"})}</div></div><button className="del" onClick={()=>delAlloc(a.id)}>🗑️</button></div>))}</div>}</div>);})}
          <div className="sec" style={{marginTop:16}}>Цілі — загальний прогрес</div>
          {goals.map(g=>{const saved=goalSaved(g.id);const pct=Math.min((saved/g.target)*100,100);return(<div key={g.id} style={{marginBottom:10,padding:"10px 12px",background:"#1a1612",borderRadius:10,border:"1px solid #222"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13}}>{g.emoji} {g.name} {g.done?"✅":""}</span><span style={{color:g.color,fontWeight:700,fontSize:13}}>{fmtN(saved)} / {g.target} zł</span></div><div className="mb"><div className="mbf" style={{width:pct+"%",backgroundColor:g.color}}/></div></div>);})}
        </>}

        {tab==="cal"&&<>
          <div className="cal-t">{MN[now.getMonth()]} {now.getFullYear()}</div>
          <div className="cal-g">{DN.map(d=><div key={d} className="cal-dn">{d}</div>)}{Array(af).fill(null).map((_,i)=><div key={"e"+i}/>)}{Array(dim).fill(null).map((_,i)=>{const d=i+1;const t=dayT(d);const isT=d===now.getDate();const has=dayA(d).length>0;return<button key={d} className={"cal-d"+(isT?" today":"")+(has?" has":"")+(selDay===d?" sel":"")} onClick={()=>setSelDay(selDay===d?null:d)}><div style={{fontSize:13,fontWeight:600}}>{d}</div>{has&&<div style={{fontSize:9,color:"#27AE60",fontWeight:700}}>{fmtN(t)}</div>}</button>;})}</div>
          {selDay&&<div className="dd"><div style={{color:"#F1C40F",fontWeight:700,marginBottom:8}}>{selDay} {MN[now.getMonth()]}</div>{dayA(selDay).length===0?<div className="emp">Немає записів</div>:dayA(selDay).map(a=>{const j=JARS.find(x=>x.id===a.jarId);return(<div key={a.id} className="hist-r"><div><span>{j?.emoji}</span> <span style={{fontWeight:600}}>{a.payFrom==="cash"?"💵":"💳"} {fmtN(a.amount)} zł</span>{a.comment&&<span style={{color:"#5a4d35",marginLeft:8,fontSize:12}}>— {a.comment}</span>}</div><button className="del" onClick={()=>delAlloc(a.id)}>🗑️</button></div>);})}</div>}
        </>}

        {tab==="quests"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div className="sec">Квести до червня</div><span style={{color:"#8a7d65",fontSize:13}}>{data.doneQ.length}/{QUESTS.length}</span></div>
          <div style={{background:"#1a1a12",borderRadius:10,padding:"10px 12px",marginBottom:14,border:"1px solid #2a2a12"}}>
            <div style={{fontSize:11,color:"#5a4d35",marginBottom:4}}>ЗАГАЛЬНИЙ ПРОГРЕС ЦІЛЕЙ</div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,color:"#8a7d65"}}>Накопичено</span><span style={{fontSize:13,fontWeight:700,color:"#E67E22"}}>{fmtN(totalGoalSaved)} / {totalGoalTarget} zł</span></div>
            <div className="mb"><div className="mbf" style={{width:Math.min((totalGoalSaved/totalGoalTarget)*100,100)+"%",backgroundColor:"#E67E22"}}/></div>
          </div>
          {QUESTS.map(q=>{const dn=data.doneQ.includes(q.id);const op=questOpen===q.id;const relGoal=q.goalId?goals.find(g=>g.id===q.goalId):null;return(<div key={q.id} className="qcard"><div className="qm" onClick={()=>setQuestOpen(op?null:q.id)}><div style={{display:"flex",alignItems:"center",gap:10}}><div className={"qch"+(dn?" done":"")}>{dn&&"✓"}</div><div><div style={{fontWeight:600,fontSize:14,opacity:dn?.5:1,textDecoration:dn?"line-through":"none"}}>{q.title}</div><div style={{color:"#F1C40F",fontSize:11}}>+{q.xp} XP</div></div></div><span style={{color:"#5a4d35"}}>{op?"▲":"▼"}</span></div>{op&&<div style={{padding:"0 14px 14px",borderTop:"1px solid #222"}}><div style={{color:"#8a7d65",fontSize:13,marginTop:12,lineHeight:1.5}}>{q.desc}</div>{relGoal&&<div style={{marginTop:8,background:"#141210",borderRadius:8,padding:"8px 10px"}}><div style={{fontSize:11,color:"#5a4d35",marginBottom:4}}>ПРОГРЕС ЦІЛІ</div><div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span>{relGoal.emoji} {relGoal.name}</span><span style={{color:relGoal.color,fontWeight:700}}>{fmtN(goalSaved(relGoal.id))} / {relGoal.target} zł</span></div><div className="mb"><div className="mbf" style={{width:Math.min((goalSaved(relGoal.id)/relGoal.target)*100,100)+"%",backgroundColor:relGoal.color}}/></div></div>}{!dn&&<button className="qbtn" onClick={()=>doQuest(q.id)}>✓ Виконано!</button>}</div>}</div>);})}
          <button className="rbtn" onClick={resetAll}>Скинути всі дані</button>
        </>}
      </div>

      {incModal&&<div className="modal" onClick={()=>setIncModal(false)}><div className="modal-c" onClick={e=>e.stopPropagation()}><div className="modal-t">Додати дохід</div><div className="tbtn-r">{[{id:"cash",l:"💵 Готівка"},{id:"card",l:"💳 Карта"}].map(t=><button key={t.id} className={"tbtn"+(incType===t.id?" on":"")} onClick={()=>setIncType(t.id)}>{t.l}</button>)}</div><input type="text" inputMode="decimal" placeholder="Сума" value={incAmt} onChange={e=>setIncAmt(e.target.value)} className="modal-i" autoFocus/><div className="qk-r">{[100,200,500,1000,1300,1500].map(a=><button key={a} className="qk" onClick={()=>setIncAmt(String(a))}>{a}</button>)}</div><button className="modal-s" onClick={addIncome} disabled={!incAmt}>Додати</button></div></div>}
      {jarModal&&<div className="modal" onClick={()=>setJarModal(null)}><div className="modal-c" onClick={e=>e.stopPropagation()}><div style={{fontSize:36,textAlign:"center"}}>{JARS.find(j=>j.id===jarModal)?.emoji}</div><div className="modal-t">{JARS.find(j=>j.id===jarModal)?.name}</div><div className="pay-label">Чим платиш?</div><div className="tbtn-r"><button className={"tbtn"+(jarPay==="cash"?" on":"")} onClick={()=>setJarPay("cash")}>💵 Готівка ({fmtN(cashBal)})</button><button className={"tbtn"+(jarPay==="card"?" on":"")} onClick={()=>setJarPay("card")}>💳 Карта ({fmtN(cardBal)})</button></div><input type="text" inputMode="decimal" placeholder="Сума" value={jarAmt} onChange={e=>setJarAmt(e.target.value)} className="modal-i" autoFocus/><div className="qk-r">{[10,20,50,100,200,500].map(a=><button key={a} className="qk" onClick={()=>setJarAmt(String(a))}>{a}</button>)}</div><input type="text" placeholder="Коментар" value={jarCom} onChange={e=>setJarCom(e.target.value)} className="modal-i2"/><button className="modal-s" onClick={allocate} disabled={!jarAmt}>В банку</button></div></div>}
      {goalModal&&<div className="modal" onClick={()=>setGoalModal(null)}><div className="modal-c" onClick={e=>e.stopPropagation()}>{(()=>{const g=goals.find(x=>x.id===goalModal);return(<><div style={{fontSize:36,textAlign:"center"}}>{g?.emoji}</div><div className="modal-t">{g?.name}</div><div style={{textAlign:"center",fontSize:13,color:"#8a7d65",marginBottom:12}}>{fmtN(goalSaved(goalModal))} / {g?.target} zł</div><div className="pay-label">Чим платиш?</div><div className="tbtn-r"><button className={"tbtn"+(goalPay==="cash"?" on":"")} onClick={()=>setGoalPay("cash")}>💵 Готівка ({fmtN(cashBal)})</button><button className={"tbtn"+(goalPay==="card"?" on":"")} onClick={()=>setGoalPay("card")}>💳 Карта ({fmtN(cardBal)})</button></div><input type="text" inputMode="decimal" placeholder="Сума" value={goalAmt} onChange={e=>setGoalAmt(e.target.value)} className="modal-i" autoFocus/><div className="qk-r">{[100,200,400,g?.target].filter(Boolean).map(a=><button key={a} className="qk" onClick={()=>setGoalAmt(String(a))}>{a}</button>)}</div><button className="modal-s orange" onClick={allocateGoal} disabled={!goalAmt}>🎯 Поповнити ціль</button></>);})()}</div></div>}
      {xferModal&&<div className="modal" onClick={()=>setXferModal(false)}><div className="modal-c" onClick={e=>e.stopPropagation()}><div className="modal-t">Переказ</div><div className="tbtn-r"><button className={"tbtn"+(xferDir==="cash2card"?" on":"")} onClick={()=>setXferDir("cash2card")}>💵→💳</button><button className={"tbtn"+(xferDir==="card2cash"?" on":"")} onClick={()=>setXferDir("card2cash")}>💳→💵</button></div><input type="text" inputMode="decimal" placeholder="Сума" value={xferAmt} onChange={e=>setXferAmt(e.target.value)} className="modal-i" autoFocus/><div className="qk-r">{[50,100,200,500,1000].map(a=><button key={a} className="qk" onClick={()=>setXferAmt(String(a))}>{a}</button>)}</div><button className="modal-s" onClick={doTransfer} disabled={!xferAmt}>Переказати</button></div></div>}

      <div className="nav">{[{id:"main",ic:"🏛️",lb:"Банки"},{id:"stats",ic:"📊",lb:"Статі"},{id:"cal",ic:"📅",lb:"Календар"},{id:"quests",ic:"⚔️",lb:"Квести"}].map(t=><button key={t.id} className={"nav-b"+(tab===t.id?" on":"")} onClick={()=>{setTab(t.id);setJarHist(null);setSelDay(null);setOpenCat(null);}}><div className="nav-ic">{t.ic}</div><div className="nav-lb">{t.lb}</div></button>)}</div>
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
